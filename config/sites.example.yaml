# Example site configuration — copy to sites.yaml and fill in real values.
# One entry per physical solar site.

sites:
  - id: "site-001"
    name: "Norfolk Solar Farm Alpha"
    latitude: 52.6309
    longitude: 1.2974
    timezone: "Europe/London"
    capacity_kwp: 5000.0
    # Solcast rooftop/utility resource ID for this site
    solcast_resource_id: "abcd-1234-efgh-5678"
    # Panel orientation
    tilt_deg: 30.0
    azimuth_deg: 0.0         # 0 = South (PVsyst convention)
    # Optional: path to SCADA CSV drop folder
    scada_csv_dir: "data/scada/site-001/"

  - id: "site-002"
    name: "Suffolk Solar Farm Beta"
    latitude: 52.1872
    longitude: 0.9708
    timezone: "Europe/London"
    capacity_kwp: 2500.0
    solcast_resource_id: "ijkl-9012-mnop-3456"
    tilt_deg: 25.0
    azimuth_deg: 0.0
    scada_csv_dir: "data/scada/site-002/"
