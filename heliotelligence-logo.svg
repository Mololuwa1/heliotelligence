<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&amp;display=swap');
    </style>
  </defs>

  <!-- === DARK HORIZONTAL LOCKUP === -->
  <rect x="0" y="0" width="800" height="600" fill="#0a0e1a"/>

  <!-- Label -->
  <text x="400" y="40" text-anchor="middle" fill="#f5a623" fill-opacity="0.45" font-family="'Barlow Condensed', sans-serif" font-size="11" letter-spacing="4">HELIOTELLIGENCE — GRID/CIRCUIT MARK</text>

  <!-- ── MARK (dot grid stems + data crossbar) at center-top ── -->
  <!-- Left stem dot grid: 3 cols × 10 rows, spacing 6, origin (7,8) scaled 2× → (114,116) origin, spacing 12 -->
  <!-- Scale factor: 2× from original 80×80 viewBox = 160×160, centered at (400,300) so top-left at (320,220) -->

  <g transform="translate(320, 220)">
    <!-- Left stem dots: cols=3, rows=10, x0=7, y0=8, spacing=6 → scale 2 → x0=14,y0=16,spacing=12 -->
    <!-- Row 0 -->
    <circle cx="14" cy="16" r="2.8" fill="white"/><circle cx="26" cy="16" r="2.8" fill="white"/><circle cx="38" cy="16" r="2.8" fill="white"/>
    <circle cx="14" cy="28" r="2.8" fill="white"/><circle cx="26" cy="28" r="2.8" fill="white"/><circle cx="38" cy="28" r="2.8" fill="white"/>
    <circle cx="14" cy="40" r="2.8" fill="white"/><circle cx="26" cy="40" r="2.8" fill="white"/><circle cx="38" cy="40" r="2.8" fill="white"/>
    <circle cx="14" cy="52" r="2.8" fill="white"/><circle cx="26" cy="52" r="2.8" fill="white"/><circle cx="38" cy="52" r="2.8" fill="white"/>
    <circle cx="14" cy="64" r="2.8" fill="white"/><circle cx="26" cy="64" r="2.8" fill="white"/><circle cx="38" cy="64" r="2.8" fill="white"/>
    <circle cx="14" cy="76" r="2.8" fill="white"/><circle cx="26" cy="76" r="2.8" fill="white"/><circle cx="38" cy="76" r="2.8" fill="white"/>
    <circle cx="14" cy="88" r="2.8" fill="white"/><circle cx="26" cy="88" r="2.8" fill="white"/><circle cx="38" cy="88" r="2.8" fill="white"/>
    <circle cx="14" cy="100" r="2.8" fill="white"/><circle cx="26" cy="100" r="2.8" fill="white"/><circle cx="38" cy="100" r="2.8" fill="white"/>
    <circle cx="14" cy="112" r="2.8" fill="white"/><circle cx="26" cy="112" r="2.8" fill="white"/><circle cx="38" cy="112" r="2.8" fill="white"/>
    <circle cx="14" cy="124" r="2.8" fill="white"/><circle cx="26" cy="124" r="2.8" fill="white"/><circle cx="38" cy="124" r="2.8" fill="white"/>

    <!-- Right stem dots: x0=53 → 106 -->
    <circle cx="106" cy="16" r="2.8" fill="white"/><circle cx="118" cy="16" r="2.8" fill="white"/><circle cx="130" cy="16" r="2.8" fill="white"/>
    <circle cx="106" cy="28" r="2.8" fill="white"/><circle cx="118" cy="28" r="2.8" fill="white"/><circle cx="130" cy="28" r="2.8" fill="white"/>
    <circle cx="106" cy="40" r="2.8" fill="white"/><circle cx="118" cy="40" r="2.8" fill="white"/><circle cx="130" cy="40" r="2.8" fill="white"/>
    <circle cx="106" cy="52" r="2.8" fill="white"/><circle cx="118" cy="52" r="2.8" fill="white"/><circle cx="130" cy="52" r="2.8" fill="white"/>
    <circle cx="106" cy="64" r="2.8" fill="white"/><circle cx="118" cy="64" r="2.8" fill="white"/><circle cx="130" cy="64" r="2.8" fill="white"/>
    <circle cx="106" cy="76" r="2.8" fill="white"/><circle cx="118" cy="76" r="2.8" fill="white"/><circle cx="130" cy="76" r="2.8" fill="white"/>
    <circle cx="106" cy="88" r="2.8" fill="white"/><circle cx="118" cy="88" r="2.8" fill="white"/><circle cx="130" cy="88" r="2.8" fill="white"/>
    <circle cx="106" cy="100" r="2.8" fill="white"/><circle cx="118" cy="100" r="2.8" fill="white"/><circle cx="130" cy="100" r="2.8" fill="white"/>
    <circle cx="106" cy="112" r="2.8" fill="white"/><circle cx="118" cy="112" r="2.8" fill="white"/><circle cx="130" cy="112" r="2.8" fill="white"/>
    <circle cx="106" cy="124" r="2.8" fill="white"/><circle cx="118" cy="124" r="2.8" fill="white"/><circle cx="130" cy="124" r="2.8" fill="white"/>

    <!-- Amber data crossbar line: original M7 40 L25 40 L30 32 L40 44 L50 36 L55 40 L73 40 → ×2 -->
    <line x1="14" y1="80" x2="146" y2="80" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
    <polyline points="14,80 50,80 60,64 80,88 100,72 110,80 146,80"
      stroke="#f5a623" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Data nodes -->
    <circle cx="50" cy="80" r="4.4" fill="#f5a623"/>
    <circle cx="60" cy="64" r="4.4" fill="#f5a623"/>
    <circle cx="80" cy="88" r="4.4" fill="#f5a623"/>
    <circle cx="100" cy="72" r="4.4" fill="#f5a623"/>
    <circle cx="110" cy="80" r="4.4" fill="#f5a623"/>
  </g>

  <!-- Wordmark below mark -->
  <text x="400" y="420" text-anchor="middle" font-family="'Barlow Condensed', Arial Narrow, sans-serif" font-weight="800" font-size="48" fill="white" letter-spacing="3">HELIO</text>
  <text x="400" y="468" text-anchor="middle" font-family="'Barlow Condensed', Arial Narrow, sans-serif" font-weight="700" font-size="48" fill="#f5a623" letter-spacing="1">TELLIGENCE</text>

  <!-- Rule + tagline -->
  <line x1="240" y1="488" x2="560" y2="488" stroke="#f5a623" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="510" text-anchor="middle" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="10" fill="white" fill-opacity="0.35" letter-spacing="3">PHYSICS-INFORMED SOLAR INTELLIGENCE</text>
</svg>
